name: Tokenist
options:
  bundleIdPrefix: com.bartbak
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  developmentLanguage: en
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: GH4CJ24HAV
targets:
  Tokenist:
    type: application
    platform: iOS
    sources:
      - path: Tokenist
    dependencies:
      - target: TokenistWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bartbak.tokenist
        MARKETING_VERSION: "0.12"
        CURRENT_PROJECT_VERSION: "3"
        TARGETED_DEVICE_FAMILY: "1,2"
        CODE_SIGN_ENTITLEMENTS: Tokenist/Tokenist.entitlements
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsMultipleScenes: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        GENERATE_INFOPLIST_FILE: YES
  TokenistWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: TokenistWidget
      - path: Tokenist/Models
      - path: Tokenist/Services/ClaudeAPIClient.swift
      - path: Tokenist/Services/KeychainStore.swift
      - path: Tokenist/Services/SharedDefaults.swift
      - path: Tokenist/Services/SharedSnapshotStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bartbak.tokenist.widget
        MARKETING_VERSION: "0.12"
        CURRENT_PROJECT_VERSION: "3"
        INFOPLIST_FILE: TokenistWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: TokenistWidget/TokenistWidget.entitlements
        SWIFT_STRICT_CONCURRENCY: minimal
        SKIP_INSTALL: YES
  TokenistMac:
    type: application
    platform: macOS
    sources:
      - path: TokenistMac
      - path: Tokenist/Models
      - path: Tokenist/Services
      - path: Tokenist/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bartbak.tokenist.mac
        PRODUCT_NAME: Tokenist
        MARKETING_VERSION: "0.12"
        CURRENT_PROJECT_VERSION: "3"
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        GENERATE_INFOPLIST_FILE: YES
